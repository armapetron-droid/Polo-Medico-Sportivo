<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForceX | Registrazione atleta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="forcex-header">
        <div class="nav-container">
            <div class="brand-logo"><span class="brand-icon">⚡</span> Force<span class="brand-highlight">X</span></div>
            <div class="brand-subtitle">Sicurezza Accessi</div>
        </div>
    </header>

    <div class="container" style="max-width: 450px; margin-top: 60px;">
        <h2>Accesso al Sistema</h2>
        <p>Inserisci le credenziali certificate per accedere alla piattaforma digitale ForceX.</p>
        
        <div id="alert-box" style="display: none;"></div>

        <form id="login-form" onsubmit="gestisciLogin(event)">
            <div class="form-group">
                <label for="email">Indirizzo Email</label>
                <input type="email" id="email" required placeholder="esempio@forcex.it">
            </div>
            
            <div class="form-group">
                <label for="password">Password di Sicurezza</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" style="width: 100%; margin-top: 10px;">🔑 Autenticazione Protetta</button>
        </form>
        <div style="margin-top: 20px; text-align: center; font-size: 0.95rem;">
            Nuovo atleta? <a href="registrazione.html" style="color: var(--fx-orange); font-weight: bold; text-decoration: none;">Crea il tuo fascicolo sanitario</a>
        </div>
        <div style="margin-top: 25px; text-align: center; font-size: 0.9rem;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Torna alla Home Page</a>
        </div>
    </div>

    <script src="core.js"></script>
    <script src="login.js"></script> 
</body>
</html>
